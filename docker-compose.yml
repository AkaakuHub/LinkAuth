services:
  dynamodb-local:
    build:
      context: .
      dockerfile: local/Dockerfile.dynamodb
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-local-data:/home/dynamodblocal/data

  user-api-local:
    build:
      context: .
      dockerfile: local/Dockerfile.user-api
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE: org-auth-users
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:?DISCORD_GUILD_ID is required}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:?DISCORD_BOT_TOKEN is required}
      INTERNAL_HMAC_KID: ${INTERNAL_HMAC_KID:?INTERNAL_HMAC_KID is required}
      INTERNAL_HMAC_SECRET: ${INTERNAL_HMAC_SECRET:?INTERNAL_HMAC_SECRET is required}
      USER_API_URL: ${USER_API_URL:?USER_API_URL is required}
    ports:
      - "9999:9999"
volumes:
  dynamodb-local-data:
